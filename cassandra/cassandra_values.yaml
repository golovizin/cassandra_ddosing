# Конфигурация для kubelauncher/cassandra chart
# https://github.com/kubelauncher/charts/tree/main/charts/cassandra
# Используем Cassandra 5.0.8 (образ по умолчанию из chart)
# Примечание: версия 4.0.3 недоступна в kubelauncher/cassandra

# Количество реплик (нод в кластере)
replicaCount: 3

# Политика управления подами: OrderedReady для последовательного запуска
# Это предотвращает ошибку "Other bootstrapping/leaving/moving nodes detected"
podManagementPolicy: OrderedReady

# Имя кластера Cassandra
clusterName: "test-cluster"

# Дата-центр
datacenter: "dc1"

# Rack (стойка в дата-центре)
rack: "rack1"

# Snitch для определения топологии кластера
# SimpleSnitch - для single-DC кластера
endpointSnitch: "SimpleSnitch"

# Настройки JVM heap
# maxHeapSize - максимальный размер heap (рекомендуется 1/4 от RAM)
maxHeapSize: "6G"
# heapNewSize - размер young generation (не рекомендуется с G1 GC в Cassandra 5.x)
#heapNewSize: ""

# Настройки ресурсов
# resourcesPreset отключён: ресурсы заданы явно через resources
resourcesPreset: ""
resources:
  limits:
    memory: 12Gi
    cpu: 400m
    # cpu limit не выставляется намеренно — даём Cassandra брать сколько нужно
  requests:
    cpu: 200m
    memory: 4Gi

# Настройки персистентного хранилища
persistence:
  enabled: true  # Включить persistent volumes
  size: 20Gi  # Размер диска на каждую ноду
  storageClass: ""  # Использовать default storage class
  accessModes:
    - ReadWriteOnce  # Режим доступа к volume
  mountPath: /data/cassandra  # Путь монтирования в контейнере

# Настройки сервиса
service:
  type: ClusterIP  # NodePort будет создан отдельным манифестом
  ports:
    cql: 9042  # Порт для CQL-подключений
    intraNode: 7000  # Порт для межузловой коммуникации
    tlsIntraNode: 7001  # Порт для TLS межузловой коммуникации

# Настройки безопасности pod
podSecurityContext:
  enabled: true
  fsGroup: 1001  # Group ID для файловой системы

# Настройки безопасности контейнера
containerSecurityContext:
  enabled: true
  runAsUser: 1001  # User ID для запуска процесса
  runAsGroup: 1001  # Group ID для запуска процесса
  runAsNonRoot: true  # Запрет запуска от root
  allowPrivilegeEscalation: false  # Запрет повышения привилегий
  readOnlyRootFilesystem: false  # Разрешить запись в root filesystem
  capabilities:
    drop: ["ALL"]  # Убрать все capabilities
  seccompProfile:
    type: RuntimeDefault  # Использовать default seccomp profile

# Настройки проб (health checks)
startupProbe:
  enabled: true
  initialDelaySeconds: 60  # Задержка перед первой проверкой
  periodSeconds: 10  # Интервал между проверками
  timeoutSeconds: 10  # Таймаут проверки
  failureThreshold: 30  # Количество неудачных попыток до рестарта
  successThreshold: 1  # Количество успешных попыток для считания готовым

livenessProbe:
  enabled: false  # Отключён: под дисковой нагрузкой nodetool таймаутится и вызывает рестарты

readinessProbe:
  enabled: false  # Отключён: под дисковой нагрузкой nodetool таймаутится и вызывает рестарты

# Кастомная конфигурация Cassandra
# Используем initContainer с sed для модификации write_request_timeout в cassandra.yaml

# Монтируем /opt/cassandra/conf как emptyDir для возможности модификации
extraVolumes:
  - name: cassandra-conf
    emptyDir: {}

extraVolumeMounts:
  - name: cassandra-conf
    mountPath: /opt/cassandra/conf

# initContainer для модификации cassandra.yaml
initContainers:
  - name: config-modifier
    image: ghcr.io/kubelauncher/cassandra:5.0.8
    command:
      - sh
      - -c
      - |
        echo "Копирование стандартных конфигов из /opt/cassandra/conf..."
        cp -r /opt/cassandra/conf/* /cassandra-conf-target/
        
        echo "Модификация write_request_timeout: 2000ms -> 100ms"
        sed -i 's/^write_request_timeout:.*/write_request_timeout: 100ms/' /cassandra-conf-target/cassandra.yaml
        
        echo "Проверка изменений:"
        grep "write_request_timeout" /cassandra-conf-target/cassandra.yaml
        
        echo "✓ Конфигурация готова"
    volumeMounts:
      - name: cassandra-conf
        mountPath: /cassandra-conf-target
